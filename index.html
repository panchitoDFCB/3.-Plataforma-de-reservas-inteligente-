<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookSmart – Plataforma de Reservas Inteligente</title>

  <!-- Fuentes -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: #0f172a;
      color: white;
    }

    .logo {
      font-family: 'Syne', sans-serif;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
    }

    .nav-links a {
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: #38bdf8;
    }

    /* HERO */
    .hero {
      height: 90vh;
      background: linear-gradient(to right, #1e293b, #0f172a);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 1.2rem;
    }

    .hero button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
      border-radius: 5px;
      transition: 0.3s;
    }

    .hero button:hover {
      background: #0ea5e9;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <header>
    <nav class="navbar">
      <h2 class="logo">BookSmart</h2>
      <ul class="nav-links">
        <li><a href="#">Inicio</a></li>
        <li><a href="#">Servicios</a></li>
        <li><a href="#">Contacto</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1>Reserva inteligente en segundos</h1>
      <p>Optimiza tu tiempo con nuestra plataforma moderna</p>
      <button>Comenzar</button>
    </div>
  </section>

</body>
</html>
